version: '3.8'

services:
  postgres_db:
    container_name: school_postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: school_admin
      POSTGRES_PASSWORD: 447c951c44220596fa3f8feec692cfd9
      POSTGRES_DB: school_management
    volumes:
      - school_pgdata:/var/lib/postgresql/data
    networks:
      - school_management_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school_admin -d school_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_cache:
    container_name: school_redis
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - school_redisdata:/data
    networks:
      - school_management_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: school_backend
    image: node:18-alpine
    working_dir: /app
    environment:
      NODE_ENV: production
      DB_HOST: school_postgres
      DB_PORT: 5432
      DB_USERNAME: school_admin
      DB_PASSWORD: 447c951c44220596fa3f8feec692cfd9
      DB_DATABASE: school_management
      REDIS_HOST: school_redis
      REDIS_PORT: 6379
      JWT_SECRET: b7bf14465b32b5b4eb394d7a833c836bda71f8c1b5fc18128e6de4de8de5b33b
      JWT_REFRESH_SECRET: b7bf14465b32b5b4eb394d7a833c836bda71f8c1b5fc18128e6de4de8de5b33b_refresh
      CORS_ORIGIN: '*'
      PORT: 3000
    ports:
      - '3001:3000'
    volumes:
      - /www/school-management/backend:/app
    command: sh -c 'npm install && npm run build && node dist/main'
    networks:
      - school_management_network
    restart: unless-stopped
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy

  frontend:
    container_name: school_frontend
    image: nginx:alpine
    ports:
      - '8081:80'
    volumes:
      - /www/school-management/frontend/dist:/usr/share/nginx/html:ro
      - /www/school-management/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - school_management_network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  school_management_network:
    external: true

volumes:
  school_pgdata:
  school_redisdata:
